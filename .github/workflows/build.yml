name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    # GitHub-hosted: the self-hosted runners-socket-proxy blocks the `attach`
    # request that buildx's docker-container driver needs (EXEC=0 by design).
    # WUD handles the redeploy from the new GHCR digest, so no self-hosted
    # step is required in this pipeline.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          sha_short=$(git rev-parse --short=7 HEAD)
          image="ghcr.io/${{ github.repository }}"
          # lowercase (GHCR requires lowercase repo names)
          image=$(echo "$image" | tr '[:upper:]' '[:lower:]')
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "sha_short=$sha_short" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.tags.outputs.push == 'true' }}
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
