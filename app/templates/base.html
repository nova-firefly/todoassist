<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}todoassist{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #262b36;
      --fg: #e6e9ef;
      --muted: #8a93a6;
      --accent: #4c8dff;
      --good: #4caf50;
      --warn: #ffb020;
      --err: #ff5964;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header h1 { font-size: 18px; margin: 0; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-right: 16px;
      font-size: 14px;
    }
    nav a:hover, nav a.active { color: var(--fg); }
    main { max-width: 960px; margin: 24px auto; padding: 0 24px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 { margin-top: 0; font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 180px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], input[type="password"], input[type="number"], select {
      width: 100%;
      background: #0b0d12;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
    }
    button, .button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
    }
    button.secondary, .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
    }
    button.danger { background: var(--err); }
    .checkbox { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .checkbox input { width: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge.on { background: rgba(76,175,80,0.15); color: var(--good); }
    .badge.off { background: rgba(138,147,166,0.15); color: var(--muted); }
    .badge.dry { background: rgba(255,176,32,0.15); color: var(--warn); }
    .badge.err { background: rgba(255,89,100,0.15); color: var(--err); }
    pre { background: #0b0d12; padding: 8px; border-radius: 4px; font-size: 12px; overflow-x: auto; margin: 0; }
    form.inline { display: inline; }
  </style>
</head>
<body>
<header>
  <h1>todoassist</h1>
  <nav>
    <a href="/">Overview</a>
    <a href="/modules/recurring-hygiene">Recurring hygiene</a>
    <a href="/modules/location-tag-reminders">Location tags</a>
    <a href="/activity">Activity</a>
    <a href="/settings">Settings</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
